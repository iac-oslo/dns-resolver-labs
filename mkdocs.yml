site_name: Working with Azure Private DNS Resolver - Workshop
site_description: Working with Azure Private DNS Resolver - Workshop
site_author: Infrastructure as Code Oslo

nav:
  - Homepage: index.md
  - Prerequisites: prerequisites.md
  - Lab 01 - Provision Set 1 (Single VNet): labs/lab-01/index.md
  - Lab 02 - Single VNet - Resolve Private Endpoint: labs/lab-02/index.md
  - Lab 03 - Single VNet - Resolve On-Prem DNS: labs/lab-03/index.md
  - Lab 04 - Provision Set 2 (Hub-Spoke): labs/lab-04/index.md
  - Lab 05 - Hub-Spoke - Resolve Private Endpoint from Spokes: labs/lab-05/index.md
  - Lab 06 - Hub-Spoke - Resolve On-Prem DNS from Spokes: labs/lab-06/index.md
  - Lab 07 - Provision Set 3 (Hub-Spoke + Azure Firewall): labs/lab-07/index.md
  - Lab 08 - Hub-Spoke + AzFW - Resolve Private Endpoint via DNS Proxy: labs/lab-08/index.md
  - Lab 09 - Hub-Spoke + AzFW - Resolve On-Prem DNS via DNS Proxy: labs/lab-09/index.md
  - Lab 10 - Cleaning up resources: labs/lab-10/index.md

theme:
  name: material
  font:
    text: Ubuntu
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - header.autohide
    - navigation.instant
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.keys
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - md_in_html
  - toc:
      toc_depth: 4
      permalink: true

copyright: Copyright &copy; 2024 Infrastructure as Code Oslo

plugins:
  - search
  - tags

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/iac-oslo/dns-resolver-labs
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.

extra_css:
  - assets/stylesheets/extra.css

repo_url: https://github.com/iac-oslo/dns-resolver-labs
